<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pranav's Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="assets/images/logo.jpg" alt="Pranav's Cafe Logo" class="logo-img">
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html#about">About</a>
            <a href="index.html#menu">Menu</a>
            <a href="login.html">Login</a>
        </nav>
        <a href="order.html" class="nav-cta">Order Now</a>
    </header>

    <main>
        <div id="vanta-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>
        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h2>Welcome Back.</h2>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Please log in to your account.</p>
                </div>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="hello@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn primary-btn full-width" style="margin-top: 1rem;">Sign In</button>
                    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                        Don't have an account? <a href="#" style="color: var(--accent-color);">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <h3>Pranav's Cafe</h3>
                <p>Minimalism & Coffee.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script>
        VANTA.FOG({
          el: "#vanta-bg",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          highlightColor: 0xa8977a,
          midtoneColor: 0x614f40,
          lowlightColor: 0x45362c,
          baseColor: 0x161711,
          blurFactor: 0.60,
          speed: 1.50,
          zoom: 1.00
        });
    </script>
</body>
</html>
